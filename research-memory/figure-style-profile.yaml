    tick_label: null
    legend: null
    title: null
    panel_label: null
  lines:
    axis_linewidth: null
    plot_linewidth: null
    errorbar_linewidth: null
    marker_size: null
  colors:
    preferred_palettes: []
    avoid_palettes: []
    directional_colors:
      positive: null
      negative: null
      neutral: null
    uncertainty_alpha: null
  layout:
    panel_label_style: null
